<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Reach</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --paper: #f5f2ec;
      --accent: #c84b2f;
      --muted: #7a7469;
      --border: #d8d3ca;
      --white: #ffffff;
      --danger: #dc3545;
      --success-bg: #d4edda;
      --success-text: #155724;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 0 1.5rem;
    }

    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      animation: fadeUp 0.5s ease forwards;
    }

    .login-card .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-align: center;
      display: block;
      margin-bottom: 0.5rem;
    }

    .login-card .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .alert-danger {
      background: #fdecea;
      border: 1px solid #f5a9a5;
      color: #8b2120;
    }

    .alert-success {
      background: var(--success-bg);
      border: 1px solid #c3e6cb;
      color: var(--success-text);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--ink);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(14,14,14,0.06);
    }

    .login-btn {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--white);
      background: var(--ink);
      border: none;
      border-radius: 4px;
      padding: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .login-btn:hover { background: var(--accent); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .lock-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      border-radius: 50%;
      color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">

      <div class="lock-icon">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </div>

      <span class="logo">Reach.</span>
      <p class="subtitle">Admin Login</p>

      <!-- Error message on bad credentials -->
      <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password.
      </div>

      <!-- Success message after logout -->
      <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out successfully.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" required autofocus/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="login-btn">
          Sign In
          <span>→</span>
        </button>
      </form>

      <a href="/" class="back-link">← Back to Home</a>
    </div>
  </div>

</body>
</html>
