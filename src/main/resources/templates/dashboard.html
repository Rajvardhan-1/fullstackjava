<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Reach</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --paper: #f5f2ec;
      --accent: #c84b2f;
      --muted: #7a7469;
      --border: #d8d3ca;
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }

    .topbar .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .topbar .logo span {
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-left: 0.5rem;
      padding: 0.2rem 0.5rem;
      background: rgba(200, 75, 47, 0.08);
      border-radius: 3px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .admin-badge {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .admin-badge svg {
      width: 16px; height: 16px;
    }

    .logout-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--white);
      background: var(--ink);
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .logout-btn:hover { background: var(--accent); transform: translateY(-1px); }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    .page-header {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease forwards;
    }

    .page-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      font-size: 0.95rem;
      color: var(--muted);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease forwards;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .stat-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-card .stat-value {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    /* ── TABLE ── */
    .table-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      animation: fadeUp 0.7s ease forwards;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .table-header h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
    }

    .refresh-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      background: rgba(200, 75, 47, 0.08);
      border: 1px solid rgba(200, 75, 47, 0.2);
      border-radius: 4px;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .refresh-btn:hover { background: rgba(200, 75, 47, 0.15); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--paper);
      padding: 0.8rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 1rem 1.5rem;
      font-size: 0.9rem;
      color: var(--ink);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tbody tr {
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(200, 75, 47, 0.03); }
    tbody tr:last-child td { border-bottom: none; }

    .msg-cell {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .id-cell {
      font-family: 'DM Sans', monospace;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .email-cell {
      color: var(--accent);
    }

    .date-cell {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .empty-state svg {
      width: 48px; height: 48px;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .loading {
      padding: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .topbar { padding: 1rem 1.25rem; }
      .main { padding: 5.5rem 1rem 3rem; }
      .stats-row { grid-template-columns: 1fr; }
      table { font-size: 0.8rem; }
      thead th, tbody td { padding: 0.7rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="/" class="logo">Reach. <span>Admin</span></a>
    <div class="topbar-actions">
      <div class="admin-badge">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
        <span th:text="${#authentication.name}">admin</span>
      </div>
      <a href="/logout" class="logout-btn">Logout →</a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="page-header">
      <h1>Contact Dashboard</h1>
      <p>View and manage all contact form submissions.</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Contacts</div>
        <div class="stat-value" id="totalCount">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Latest Submission</div>
        <div class="stat-value" id="latestDate" style="font-size:1.2rem; margin-top:0.5rem;">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div class="stat-value" style="font-size:1.2rem; margin-top:0.5rem; color: #2e7d32;">● Live</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-header">
        <h2>All Submissions</h2>
        <button class="refresh-btn" onclick="loadContacts()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
          </svg>
          Refresh
        </button>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading contacts...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3 3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
        </svg>
        <p>No contacts submitted yet.<br/>Submissions from the contact form will appear here.</p>
      </div>

      <table id="contactsTable" style="display:none;">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="contactsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadContacts() {
      const loading   = document.getElementById('loading');
      const empty     = document.getElementById('emptyState');
      const table     = document.getElementById('contactsTable');
      const tbody     = document.getElementById('contactsBody');
      const totalEl   = document.getElementById('totalCount');
      const latestEl  = document.getElementById('latestDate');

      loading.style.display = 'block';
      empty.style.display   = 'none';
      table.style.display   = 'none';

      try {
        const res  = await fetch('/api/contacts');
        const data = await res.json();

        loading.style.display = 'none';
        totalEl.textContent   = data.length;

        if (data.length === 0) {
          empty.style.display = 'block';
          latestEl.textContent = '—';
          return;
        }

        // Sort by id descending (newest first)
        data.sort((a, b) => b.id - a.id);

        // Latest date
        if (data[0].submittedAt) {
          const d = new Date(data[0].submittedAt);
          latestEl.textContent = d.toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric'
          });
        }

        tbody.innerHTML = '';
        data.forEach(c => {
          const tr = document.createElement('tr');
          const date = c.submittedAt
            ? new Date(c.submittedAt).toLocaleString('en-IN', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
              })
            : '—';

          tr.innerHTML = `
            <td class="id-cell">#${c.id}</td>
            <td><strong>${escapeHtml(c.name)}</strong></td>
            <td class="email-cell">${escapeHtml(c.email)}</td>
            <td class="msg-cell" title="${escapeHtml(c.message)}">${escapeHtml(c.message)}</td>
            <td class="date-cell">${date}</td>
          `;
          tbody.appendChild(tr);
        });

        table.style.display = 'table';

      } catch (err) {
        loading.innerHTML = '<p style="color:#8b2120;">Failed to load contacts. Is the server running?</p>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // Load on page ready
    document.addEventListener('DOMContentLoaded', loadContacts);
  </script>

</body>
</html>
